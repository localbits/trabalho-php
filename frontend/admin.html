<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Sistema Cadastro</title>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header class="top_header">
            <button id="toggle">☰</button>
            <h1>Área do Administrador</h1>
        </header>
        
            <aside id="sidebar" class="sidebar">
                    <input type="checkbox" name="dark-theme" id="dark-theme">   
                    <label for="dark-theme"><strong>Enable dark mode</strong></label>
            </aside>

        <main class="content">
                <form action= "../backend/bancoDados.php" method="POST">

                    <h2>Cadastro</h2>

                    <input type="TEXT" name="username" placeholder="Name"> <br><br>
                    <input type="TEXT" name="login" placeholder="Login"> <br><br>
                    <input type="TEXT" name="email" placeholder="Email"> <br><br>
                    <input type="TEXT" name="password" placeholder="Password"> <br><br>

                    <button type="submit" name="insert_user">
                        Enviar
                    </button>

                </form>

                <br>

                <form action="../backend/bancoDados.php" method="POST">

                    <h2>Excluir cadastro</h2>

                    <input type="TEXT" name="target" placeholder="Login">

                    <button type="submit" name="delete_user">
                        Excluir
                    </button>

                </form>

                <br>

                <form action="../backend/bancoDados.php" method="POST">

                    <h2>Buscar cadastro</h2>

                    <input type="TEXT" name="search" placeholder="Login">

                    <button type="submit" name="search_single_user">
                        Buscar
                    </button>

                </form>

                <br>

                <form action="../backend/bancoDados.php" method="POST">

                    <button type="submit" name="search_all_users">
                        Listar cadastros
                    </button>

                </form>

                <br>

                <form action="../backend/auth.php" method="POST">

                    <button type="submit" name="logout">
                        Finalizar sessão
                    </button>

                </form>
        </main>

        <footer><p>© 2026 Sistema Acadêmico</p></footer>

        <script>
          const toggleBtn = document.getElementById('toggle');
          const sidebar = document.getElementById('sidebar');
          const darkThemeCheckbox = document.getElementById('dark-theme');

          toggleBtn.addEventListener('click', () => {
              sidebar.classList.toggle('toggled');
          });

          /* Returns the value of a given cookie name through string manipulation.
           * The function appends "; " to the string list of cookies in the website, then splits said list using ; name= as the delimiter.
           * Taking the split list the function checks whether its length is equal to 2 or not, if it is that means we have successfully found the value from the cookie we needed.
           * What remains is to acquire the value itself which is done by:
           * - pop(): work with the last string of the array
           * - split(";"): splits by ;
           * - shift(): gets the first string element which is the value we needed.
           * */

          function getCookie(name) {
              let value = "; " + document.cookie;
              let parts = value.split("; " + name + "=");
              if (parts.length === 2) return parts.pop().split(";").shift();
          }

          const themePreference = getCookie("theme");

          if (themePreference === "dark") {
              document.body.classList.add('dark');
              darkThemeCheckbox.checked = true; 
          } else {
              document.body.classList.remove('dark');
              darkThemeCheckbox.checked = false;
          }

          darkThemeCheckbox.addEventListener('change', () => {
              if (darkThemeCheckbox.checked) {
                  document.body.classList.add('dark');
                  document.cookie = "theme=dark; max-age=" + (60 * 60 * 24 * 365) + "; path=/";
              } else {
                  document.body.classList.remove('dark');
                  document.cookie = "theme=light; max-age=" + (60 * 60 * 24 * 365) + "; path=/";
              }
          });
        </script>
    </body>

</html>
